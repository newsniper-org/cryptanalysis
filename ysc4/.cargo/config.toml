[build]
# 참조 구현은 musl을 기본 타겟으로 한다.
# - glibc 의존성을 끊고 fully-static 바이너리/라이브러리를 만든다.
# - `no_std` 사양과 자연스럽게 맞아떨어지며, 임베디드/FHE 백엔드로의 포팅 검증을 강제한다.
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
# musl-libc에는 일부 기능이 빠져 있으므로 link arg를 명시.
rustflags = [
    "-C", "target-feature=+crt-static",
]

# 다른 호스트(예: arm64)에서 cross-compile 시 musl 변종을 동일하게 적용한다.
[target.i586-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
]

